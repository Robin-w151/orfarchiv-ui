version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    target-branch: develop
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '02:00'
      timezone: 'Europe/Vienna'
    cooldown:
      default-days: 2
    commit-message:
      prefix: 'chore(deps)'
    groups:
      dependencies:
        applies-to: version-updates
        patterns:
          - '*'
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
      - dependency-name: '@mozilla/readability'
        versions: '>0.5.0'
      - dependency-name: 'svelte'
        versions: '>5.55.2'
